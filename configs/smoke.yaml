# Fast end-to-end PPO run used to validate the project.
ENV_ID: "LunarLander-v3"
NUM_ENVS: 2
VECTOR_ENV: "sync"
FRAME_SIZE: 64
STACK_SIZE: 4
MAX_EPISODE_STEPS: 80
SEED: 7

DEVICE: "cpu"
USE_MIXED_PRECISION: false
USE_TORCH_COMPILE: false
PIN_MEMORY: false
USE_MLFLOW: false
OUTPUT_DIR: "runs"
CHECKPOINT_DIR: "checkpoints"
LOG_INTERVAL: 1

model_name: "TinyCNNGRU"
PRETRAINED_BACKBONE: false
HIDDEN_SIZE: 64
GRU_LAYERS: 1

LEARNING_RATE: 0.0003
BACKBONE_LEARNING_RATE:
GAMMA: 0.99
GAE_LAMBDA: 0.95
VALUE_COEFF: 0.5
ENTROPY_COEFF: 0.01
CLIP_EPSILON: 0.2
TARGET_KL:
PPO_EPOCHS: 1
BATCH_SIZE: 8
NUM_ROUNDS: 1
NUM_STEPS_PER_ROLLOUT: 8
MAX_GRAD_NORM: 1.0
CHECKPOINT_FREQUENCY: 0
CHECKPOINT_PATH:
